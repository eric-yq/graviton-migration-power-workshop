flake8-annotations-complexity = "^0.0.7"
flake8-commas = "^2.1.0"
flake8-quotes = "^3.3.1"
flake8-isort = "^4.1.1"
pep8-naming = "^0.12.1"
flake8-eradicate = "^1.2.0"
mypy = "^1.3.0"
black = "^22.1.0"
pytest = "^7.1.1"
pytest-asyncio = "^0.21.0"
pytest-cov = "^3.0.0"
pytest-mock = "^3.10.0"
pyproject-flake8 = "^0.0.1-alpha.4"
factory-boy = "^3.2.1"
PyJWT = "^2.3.0"
debugpy = "^1.6.2"
types-PyYAML = "^6.0.11"
pytest-alembic = "^0.8.3"
respx = "^0.20.1"
