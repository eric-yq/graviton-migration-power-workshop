alibabacloud-credentials = "^1.0.4"
alibabacloud-tea-openapi = "^0.4.2"
alibabacloud-tea-util = "^0.3.14"

[tool.poetry.group.dev.dependencies]
flake8 = "^4.0.1"
flake8-bugbear = "^22.3.20"
